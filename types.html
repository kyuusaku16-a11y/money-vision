    <main class="guide-main">
      <article class="panel guide-body">
        <h1 class="page-title">ミラため性格診断 全16タイプ図鑑</h1>
        <p>
          あなたの入力から<strong>「ため力」「そだて方」「そなえ」「しこみ」</strong>の4つの軸を読み取って、16タイプの動物に当てはめます。質問はゼロ、答えは実際の家計だから正直。タイプに優劣はなく、それぞれ違う習性と、しあわせに暮らすコツがあります。数字を変えるとタイプも変わります。
        </p>
        <div class="type-grid" id="typeGrid"></div>
        <p class="guide-cta"><a href="./?diagnose=1">🌰 自分のタイプを診断する（無料・30秒）</a></p>
      </article>
    </main>

    <footer>
      <p>診断はミラための入力内容から4つの軸を読み取るお楽しみ機能です。結果に金額は含まれません。</p>
      <p><a href="./">トップにもどる</a>／<a href="guide.html">使い方と計算の仕組み</a></p>
      <p>更新のお知らせ: <a href="https://x.com/AiYKIMdrmTKjiZI" target="_blank" rel="noopener">X（ぴよため）</a>／<a href="https://note.com/piyo_tame" target="_blank" rel="noopener">note</a></p>
    </footer>

    <script type="module">
      import { allTypes, typeImagePath } from './src/share.js';
      import { DESCRIPTIONS } from './src/descriptions.js';
      import { EXTRAS } from './src/extras.js';
      const grid = document.getElementById('typeGrid');
      for (const t of allTypes()) {
        const card = document.createElement('div');
        card.className = 'type-card';
        card.id = t.code; // types.html#CGSF のような直リンク用
        const emoji = document.createElement('img');
        emoji.className = 'type-img';
        emoji.src = typeImagePath(t.code);
        emoji.alt = t.name;
        emoji.loading = 'lazy';
        emoji.addEventListener('error', () => {
          const fallback = document.createElement('span');
          fallback.className = 'type-emoji';
          fallback.textContent = t.emoji;
          emoji.replaceWith(fallback);
        });
        const code = document.createElement('span');
        code.className = 'type-code';
        code.textContent = t.code.split('').join('-');
        const name = document.createElement('strong');
        name.textContent = t.name;
        const tags = document.createElement('p');
        tags.className = 'type-tags';
        tags.textContent = t.tags.join('×');
        const quote = document.createElement('p');
        quote.className = 'type-quote';
        quote.textContent = `「${t.hitokoto}」`;
        card.append(emoji, code, name, tags, quote);
        const paras = DESCRIPTIONS[t.code] ?? [];
        if (paras.length) {
          const more = document.createElement('details');
          more.className = 'type-more';
          const summary = document.createElement('summary');
          summary.textContent = 'くわしく見る';
          more.appendChild(summary);
          for (const p of paras) {
            const para = document.createElement('p');
            para.textContent = p;
            more.appendChild(para);
          }
          const extra = EXTRAS[t.code];
          if (extra) {
            const h = (text) => {
              const el = document.createElement('strong');
              el.className = 'type-extra-h';
              el.textContent = text;
              return el;
            };
            more.appendChild(h('こんなところ、ありませんか'));
            const ul = document.createElement('ul');
            ul.className = 'type-aruaru';
            for (const a of extra.aruaru) {
              const li = document.createElement('li');
              li.textContent = a;
              ul.appendChild(li);
            }
            more.appendChild(ul);
            more.appendChild(h('気をつけたい落とし穴'));
            const oto = document.createElement('p');
            oto.textContent = extra.otoshiana;
            more.appendChild(oto);
            more.appendChild(h('このタイプに効くよみもの'));
            const links = document.createElement('ul');
            links.className = 'type-yomimono';
            for (const y of extra.yomimono) {
              const li = document.createElement('li');
              const a = document.createElement('a');
              a.href = y.href;
              a.textContent = y.title;
              li.appendChild(a);
              links.appendChild(li);
            }
            more.appendChild(links);
          }
          card.append(more);
        }
        grid.appendChild(card);
      }
    </script>
    <script data-goatcounter="https://money-vision.goatcounter.com/count" async src="vendor/count.js"></script>
